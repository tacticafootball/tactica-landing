<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<title>tactica. | Page not found</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0a0c0e;
    --panel: rgba(255,255,255,0.035);
    --panel-border: rgba(255,255,255,0.09);
    --ink: #eef1f0;
    --mist: #8b93a0;
    --mist-dim: #565d68;
    --signal: #a855f7;
    --signal-dim: rgba(168,85,247,0.14);
    --signal-glow: rgba(168,85,247,0.35);
    --signal-light: #d8b4fe;
    --divider: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  h1, h2 { text-wrap: balance; }

  body {
    background: var(--void);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, black 20%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 600px;
    background: radial-gradient(ellipse at center, var(--signal-dim) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { max-width: 1040px; margin: 0 auto; padding: 0 28px; position: relative; z-index: 1; }

  .skip-link {
    position: absolute; top: -60px; left: 12px; z-index: 200;
    background: var(--void); color: var(--ink); border: 1px solid var(--signal);
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px;
    padding: 12px 20px; border-radius: 10px; text-decoration: none;
    transition: top 0.15s ease;
  }
  .skip-link:focus { top: 12px; }

  main.notfound {
    flex: 1; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 72px 0;
  }
  .notfound-code {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em;
    color: var(--signal); margin-bottom: 20px;
  }
  .notfound h1 {
    font-family: 'League Spartan', sans-serif; font-weight: 700; font-size: clamp(32px, 5vw, 52px);
    line-height: 1.1; letter-spacing: -0.02em; max-width: 620px; margin: 0 auto 18px;
  }
  .notfound .sub {
    max-width: 460px; margin: 0 auto 36px; color: var(--mist); font-size: 16px; line-height: 1.65;
  }
  .btn-primary {
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14.5px; color: #160a24;
    background: var(--signal); padding: 14px 26px; border-radius: 10px; text-decoration: none;
    box-shadow: 0 8px 24px -6px var(--signal-glow); transition: transform 0.15s ease, box-shadow 0.15s ease;
    border: none; cursor: pointer; display: inline-block;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 30px -6px var(--signal-glow); }
  .btn-primary:active { transform: translateY(0) scale(0.98); box-shadow: 0 6px 18px -6px var(--signal-glow); }
  .btn-secondary {
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14.5px; color: var(--ink);
    background: transparent; border: 1px solid var(--panel-border); padding: 13px 24px;
    border-radius: 10px; text-decoration: none; transition: border-color 0.15s ease, transform 0.15s ease;
    cursor: pointer;
  }
  .btn-secondary:hover { border-color: var(--mist); }
  .btn-secondary:active { transform: scale(0.98); }

  footer { padding: 40px 0 56px; text-align: center; border-top: 1px solid var(--divider); position: relative; z-index: 1; }
  footer .foot-logo { font-family: 'League Spartan', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 8px; }
  footer .foot-logo span { color: var(--signal); }
  footer p { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--mist-dim); letter-spacing: 0.04em; }

  /* COOKIE CONSENT */
  .cookie-banner {
    position: fixed; left: 0; right: 0; bottom: -240px; z-index: 150;
    display: flex; align-items: center; justify-content: center; gap: 18px; flex-wrap: wrap;
    background: var(--panel); border-top: 1px solid var(--panel-border);
    backdrop-filter: blur(20px); padding: 20px 28px;
    transition: bottom 0.3s ease;
  }
  .cookie-banner.show { bottom: 0; }
  .cookie-banner p {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--mist);
    letter-spacing: 0.02em; line-height: 1.6; max-width: 560px; margin: 0;
  }
  .cookie-banner p a { color: var(--signal); text-decoration: none; }
  .cookie-banner-actions { display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
  @media (prefers-reduced-motion: reduce) { .cookie-banner { transition: none; } }

  :focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }
</style>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to content</a>

<div class="cookie-banner" id="cookieBanner" role="dialog" aria-label="Cookie consent">
  <p>tactica. uses cookies to understand how the site is used. See our <a href="/privacy.html">Privacy Policy</a> for details.</p>
  <div class="cookie-banner-actions">
    <button type="button" class="btn-secondary" id="cookieReject">Necessary only</button>
    <button type="button" class="btn-primary" id="cookieAccept">Accept</button>
  </div>
</div>

<div class="glow"></div>

<main class="notfound" id="main-content">
  <div class="wrap">
    <div class="notfound-code">404</div>
    <h1>This page doesn't exist.</h1>
    <p class="sub">Unlike our confidence scores, that's certain.</p>
    <a href="/" class="btn-primary">Back to tactica.</a>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="foot-logo">tactica<span>.</span></div>
    <p>FOOTBALL INTELLIGENCE, BUILT ON EVIDENCE</p>
  </div>
</footer>

<script>
  const CONSENT_KEY = 'tactica_cookie_consent';

  function loadGA() {
    const s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-DH2E30FW6N';
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.gtag = gtag;
    gtag('js', new Date());
    gtag('config', 'G-DH2E30FW6N');
  }

  function initConsent() {
    const stored = localStorage.getItem(CONSENT_KEY);
    if (stored === 'accepted') { loadGA(); return; }
    if (stored === 'rejected') { return; }
    // No choice made yet — show the banner
    document.getElementById('cookieBanner').classList.add('show');
  }

  function acceptCookies() {
    localStorage.setItem(CONSENT_KEY, 'accepted');
    document.getElementById('cookieBanner').classList.remove('show');
    loadGA();
  }

  function rejectCookies() {
    localStorage.setItem(CONSENT_KEY, 'rejected');
    document.getElementById('cookieBanner').classList.remove('show');
  }

  document.addEventListener('DOMContentLoaded', initConsent);
  document.getElementById('cookieAccept').addEventListener('click', acceptCookies);
  document.getElementById('cookieReject').addEventListener('click', rejectCookies);
</script>

</body>
</html>
